<div class="root">
  <div class="root__left">
    <div class="left__logo">
      <ng-container *ngComponentOutlet="SvgLogo" />
    </div>

    <div class="left__toggle_mode">
      <button class="toggle_mode__svg">
        <ng-container *ngComponentOutlet="SvgToggle()" />
      </button>
    </div>
  </div>

  <div class="root__right">
    <div class="root__thumbnail_user">
      <img src="/images/thumbnail_user.png" alt="user thumbnail" class="thumbnail_user__img" />
    </div>
  </div>
</div>
