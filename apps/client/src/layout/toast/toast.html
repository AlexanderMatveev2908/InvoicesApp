<div
  #toast
  class="root"
  [style.--clr]="mainColor()"
  [ngClass]="toastState().isToast ? 'pointer-events-auto' : 'pointer-events-none'"
>
  <button class="root__close_area svg__2xl" (click)="closeClick()">
    <ng-container *ngComponentOutlet="SvgFillClose" />
  </button>

  <div class="root__status">
    <span>
      {{ toastState().status }}
    </span>
  </div>

  <div class="root__msg">
    <span #msgContainer>
      {{ trimmedMsg() }}
    </span>
  </div>

  <div #timerToast class="root__timer"></div>
</div>
