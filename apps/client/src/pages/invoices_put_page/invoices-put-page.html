<app-page-wrapper [waitClient]="true" [isPending]="!currInvoice()">
  <ng-template #contentRef>
    <div class="root" [ngClass]="useTheme.ifDark('bg-black_0', 'bg-white_0')">
      <app-go-back-mobile />

      <div class="root__title">
        <span class="hd__m" [ngClass]="useTheme.ifDark('text-white', 'text-gray_3')">Edit</span>
        &nbsp;
        <span class="hd__m" [ngClass]="useTheme.ifDark('text-gray_1', 'text-gray_1')">#</span>
        <span class="hd__m" [ngClass]="useTheme.ifDark('text-white', 'text-gray_3')">{{
          currInvoice()?.clientId
        }}</span>
      </div>

      <app-invoices-form-mobile
        [currInvoice]="currInvoice()"
        [isPendingSave]="saveTracker.isPending()"
        [cbSave]="submitSave"
      />
    </div>
  </ng-template>
</app-page-wrapper>
