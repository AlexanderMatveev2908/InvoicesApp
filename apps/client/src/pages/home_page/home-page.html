<div class="root" [ngClass]="useTheme.ifDark('bg-black_0', 'bg-[#F8F8FB]')">
  <app-header-home-mobile-tablet-desktop />

  @let invoices = invoicesSlice.invoices();

  @if (invoices.length) {
    <app-invoices-home-mobile-tablet-desktop />
  } @else {
    <app-no-invoices-mobile-tablet-desktop />
  }
</div>
