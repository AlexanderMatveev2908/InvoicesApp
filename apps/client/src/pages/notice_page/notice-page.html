<app-page-wrapper [waitClient]="true">
  <ng-template #contentRef>
    <div class="root" [style.--clr]="mainColor()">
      <div class="root__svg">
        <div class="svg__content">
          <ng-container *ngComponentOutlet="Svg()" />
        </div>
      </div>

      <div class="root__status">
        <span>
          {{ noticeState().status }}
        </span>
      </div>

      <div class="root__msg">
        <span>
          {{ noticeState().msg }}
        </span>
      </div>

      <div class="root__content">
        @if (noticeState().tmpt === 'HOME') {
          <a routerLink="/">Go Home</a>
        } @else if (noticeState().tmpt === 'MAIL') {
          <a href="https://mail.google.com" target="_blank" rel="noopener"> Open Gmail </a>
        }
      </div>
    </div>
  </ng-template>
</app-page-wrapper>
