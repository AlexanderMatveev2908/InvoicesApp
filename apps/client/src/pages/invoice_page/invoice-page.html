<app-page-wrapper [waitClient]="true" [isPending]="!currInvoice()">
  <ng-template #contentRef>
    <app-invoice-page-element-mobile
      [currInvoice]="currInvoice()"
      [isPop]="isPop()"
      [toggle]="toggle"
    />

    <app-popup
      [isPop]="isPop()"
      [title]="'Confirm Deletion'"
      [description]="descriptionDelete()"
      [cb]="cbDelete"
      [action]="'Delete'"
      [toggle]="toggle"
      [isPending]="deletingTracker.isPending()"
    />
  </ng-template>
</app-page-wrapper>
